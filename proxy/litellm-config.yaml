# LiteLLM proxy — Forge Space local model gateway
# Maps Claude/GPT model names to local Ollama models on the workstation
# Start: litellm --config litellm-config.yaml
# Port: 4000
# Auth: sk-forge-local

model_list:
  # Claude aliases → forge-dev:14b (Qwen 3.5 27B)
  - model_name: claude-haiku-4-5
    litellm_params:
      model: ollama/forge-dev:14b
      api_base: http://localhost:11434

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: ollama/forge-dev:14b
      api_base: http://localhost:11434

  - model_name: claude-opus-4-6
    litellm_params:
      model: ollama/forge-dev:14b
      api_base: http://localhost:11434

  # Primary local models
  - model_name: forge-dev:14b
    litellm_params:
      model: ollama/forge-dev:14b
      api_base: http://localhost:11434
      num_ctx: 32768

  - model_name: forge-claude:14b
    litellm_params:
      model: ollama/forge-claude:14b
      api_base: http://localhost:11434
      num_ctx: 32768

  # Fast lightweight model
  - model_name: qwen3.5:9b
    litellm_params:
      model: ollama/qwen3.5:9b
      api_base: http://localhost:11434
      num_ctx: 16384

  # Reasoning model (chain-of-thought)
  - model_name: deepseek-r1:14b
    litellm_params:
      model: ollama/deepseek-r1:14b
      api_base: http://localhost:11434
      num_ctx: 16384

  # Legacy / fallback
  - model_name: forge-dev:32b
    litellm_params:
      model: ollama/forge-dev:32b
      api_base: http://localhost:11434
      num_ctx: 32768

litellm_settings:
  success_callback:
    - forge_trainer.forge_trainer

general_settings:
  master_key: sk-forge-local
  port: 4000
